<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCD Expert - CoeurSolidaire</title>
    <!-- Robust Libraries for Local Usage -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/viz.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/viz.js/2.1.2/full.render.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #ffffff;
            font-family: 'Roboto', sans-serif;
        }

        #graph {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            z-index: 50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            color: #64748b;
            font-weight: 500;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #e2e8f0;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Floating Controls */
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: white;
            padding: 8px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        button {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #475569;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        button:hover {
            background: #f1f5f9;
            color: #1e293b;
            border-color: #cbd5e1;
        }

        button svg {
            width: 22px;
            height: 22px;
        }

        /* Search Bar */
        .search-container {
            position: fixed;
            top: 20px;
            left: 20px;
            background: white;
            padding: 8px 12px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 100;
        }

        input {
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 0.95rem;
            width: 200px;
            color: #1e293b;
        }

        .brand {
            font-weight: 700;
            color: #3b82f6;
            border-right: 1px solid #e2e8f0;
            padding-right: 12px;
            margin-right: 4px;
        }

        /* SVG Styles */
        svg {
            width: 100%;
            height: 100%;
        }

        /* Interactive Nodes */
        .node {
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .node:hover polygon {
            stroke: #3b82f6 !important;
            stroke-width: 2px !important;
        }

        /* Highlight Class */
        .highlighted polygon {
            stroke: #ef4444 !important;
            stroke-width: 4px !important;
        }

        .highlighted text {
            font-weight: bold !important;
            fill: #b91c1c !important;
        }

        /* Modal Styles */
        #modalOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }

        #modalContent {
            background: white;
            width: 600px;
            max-width: 90%;
            max-height: 80vh;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: modalIn 0.3s ease-out;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .modal-close {
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            font-size: 1.5rem;
            width: auto;
            height: auto;
            padding: 0;
            display: flex;
        }

        .modal-close:hover {
            color: #ef4444;
            background: none;
        }

        .modal-body {
            padding: 0;
            overflow-y: auto;
            background: #1e293b;
        }

        pre {
            margin: 0;
            padding: 1.5rem;
            color: #f1f5f9;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        /* Syntax Highlighting (Simple) */
        .sql-kw {
            color: #f472b6;
            font-weight: bold;
        }

        /* Keyword Pink */
        .sql-type {
            color: #60a5fa;
        }

        /* Type Blue */
        .sql-str {
            color: #a3e635;
        }

        /* String Green */
        .sql-comment {
            color: #94a3b8;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Chargement du moteur graphique...</div>
    </div>

    <div class="search-container">
        <div class="brand">MCD</div>
        <input type="text" id="searchInput" placeholder="Rechercher une table..." autocomplete="off">
    </div>

    <!-- Modal -->
    <div id="modalOverlay">
        <div id="modalContent">
            <div class="modal-header">
                <div class="modal-title">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" />
                        <line x1="16" y1="13" x2="8" y2="13" />
                        <line x1="16" y1="17" x2="8" y2="17" />
                        <polyline points="10 9 9 9 8 9" />
                    </svg>
                    <span id="modalTableName">Table Definition</span>
                </div>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="modalCode">Loading...</pre>
            </div>
        </div>
    </div>

    <div id="graph"></div>

    <div class="controls">
        <button onclick="panZoom.zoomIn()" title="Zoom +"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M12 5v14M5 12h14" />
            </svg></button>
        <button onclick="panZoom.zoomOut()" title="Zoom -"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2">
                <path d="M5 12h14" />
            </svg></button>
        <button onclick="panZoom.resetZoom(); panZoom.center();" title="Réinitialiser"><svg viewBox="0 0 24 24"
                fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                <path d="M9 22V12h6v10" />
            </svg></button>
    </div>

    <script>
        // --- SQL DEFINITIONS ---
        const tableDefinitions = {
            "User": `CREATE TABLE "User" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "email" TEXT NOT NULL,
  "passwordHash" TEXT NOT NULL,
  "role" TEXT NOT NULL DEFAULT 'VOLUNTEER', -- ADMIN, MANAGER, VOLUNTEER
  "firstName" TEXT,
  "lastName" TEXT,
  "centerId" TEXT,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME,
  CONSTRAINT "User_centerId_fkey" FOREIGN KEY ("centerId") REFERENCES "Center" ("id")
);`,
            "Center": `CREATE TABLE "Center" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "name" TEXT NOT NULL,
  "address" TEXT NOT NULL,
  "city" TEXT NOT NULL,
  "zipCode" TEXT NOT NULL,
  "phone" TEXT,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME
);`,
            "Beneficiary": `CREATE TABLE "Beneficiary" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "firstName" TEXT NOT NULL,
  "lastName" TEXT NOT NULL,
  "email" TEXT,
  "phone" TEXT,
  "address" TEXT,
  "city" TEXT,
  "zipCode" TEXT,
  "familyComposition" TEXT, -- JSON
  "income" REAL,
  "pointsBalance" INTEGER NOT NULL DEFAULT 0,
  "centerId" TEXT NOT NULL,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME,
  CONSTRAINT "Beneficiary_centerId_fkey" FOREIGN KEY ("centerId") REFERENCES "Center" ("id")
);`,
            "Campaign": `CREATE TABLE "Campaign" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "name" TEXT NOT NULL,
  "startDate" DATETIME NOT NULL,
  "endDate" DATETIME NOT NULL,
  "centerId" TEXT NOT NULL,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME,
  CONSTRAINT "Campaign_centerId_fkey" FOREIGN KEY ("centerId") REFERENCES "Center" ("id")
);`,
            "Registration": `CREATE TABLE "Registration" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "status" TEXT NOT NULL DEFAULT 'PENDING', -- PENDING, APPROVED, REJECTED
  "notes" TEXT,
  "beneficiaryId" TEXT NOT NULL,
  "campaignId" TEXT NOT NULL,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME,
  CONSTRAINT "Registration_beneficiaryId_fkey" FOREIGN KEY ("beneficiaryId") REFERENCES "Beneficiary" ("id"),
  CONSTRAINT "Registration_campaignId_fkey" FOREIGN KEY ("campaignId") REFERENCES "Campaign" ("id")
);`,
            "Product": `CREATE TABLE "Product" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "name" TEXT NOT NULL,
  "description" TEXT,
  "unit" TEXT NOT NULL, -- KG, L, UNIT
  "pointsCost" INTEGER NOT NULL,
  "categoryId" TEXT NOT NULL,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME,
  CONSTRAINT "Product_categoryId_fkey" FOREIGN KEY ("categoryId") REFERENCES "ProductCategory" ("id")
);`,
            "Category": `CREATE TABLE "ProductCategory" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "name" TEXT NOT NULL,
  "description" TEXT,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME
);`,
            "Stock": `CREATE TABLE "Stock" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "quantity" REAL NOT NULL DEFAULT 0,
  "minThreshold" REAL DEFAULT 10,
  "productId" TEXT NOT NULL,
  "centerId" TEXT NOT NULL,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME,
  CONSTRAINT "Stock_productId_fkey" FOREIGN KEY ("productId") REFERENCES "Product" ("id"),
  CONSTRAINT "Stock_centerId_fkey" FOREIGN KEY ("centerId") REFERENCES "Center" ("id")
);`,
            "Lot": `CREATE TABLE "Lot" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "batchNumber" TEXT NOT NULL,
  "expirationDate" DATETIME,
  "receivedDate" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "quantity" REAL NOT NULL,
  "stockId" TEXT NOT NULL,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "updatedAt" DATETIME,
  CONSTRAINT "Lot_stockId_fkey" FOREIGN KEY ("stockId") REFERENCES "Stock" ("id")
);`,
            "Mvt": `CREATE TABLE "StockMovement" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "type" TEXT NOT NULL, -- IN, OUT, ADJUSTMENT, EXPIRATION
  "quantity" REAL NOT NULL,
  "reason" TEXT,
  "stockId" TEXT NOT NULL,
  "userId" TEXT NOT NULL,
  "lotId" TEXT,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  CONSTRAINT "StockMovement_stockId_fkey" FOREIGN KEY ("stockId") REFERENCES "Stock" ("id"),
  CONSTRAINT "StockMovement_userId_fkey" FOREIGN KEY ("userId") REFERENCES "User" ("id")
);`,
            "Distribution": `CREATE TABLE "Distribution" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "date" DATETIME DEFAULT CURRENT_TIMESTAMP,
  "totalPoints" INTEGER NOT NULL,
  "beneficiaryId" TEXT NOT NULL,
  "centerId" TEXT NOT NULL,
  "userId" TEXT NOT NULL,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  CONSTRAINT "Distribution_beneficiaryId_fkey" FOREIGN KEY ("beneficiaryId") REFERENCES "Beneficiary" ("id"),
  CONSTRAINT "Distribution_centerId_fkey" FOREIGN KEY ("centerId") REFERENCES "Center" ("id")
);`,
            "DistItem": `CREATE TABLE "DistributionItem" (
  "id" TEXT NOT NULL PRIMARY KEY,
  "quantity" REAL NOT NULL,
  "pointsCost" INTEGER NOT NULL,
  "distributionId" TEXT NOT NULL,
  "productId" TEXT NOT NULL,
  "createdAt" DATETIME DEFAULT CURRENT_TIMESTAMP,
  CONSTRAINT "DistributionItem_distributionId_fkey" FOREIGN KEY ("distributionId") REFERENCES "Distribution" ("id"),
  CONSTRAINT "DistributionItem_productId_fkey" FOREIGN KEY ("productId") REFERENCES "Product" ("id")
);`
        };

        // --- DOT SOURCE ---
        const dotSrc = `
digraph Models {
    graph [
        rankdir=TB
        splines=ortho
        nodesep=0.8
        ranksep=1.2
        fontname="Roboto"
        fontsize=12
        bgcolor="#ffffff"
    ];
    
    node [
        fontname="Roboto"
        fontsize=12
        shape=plaintext
    ];
    
    edge [
        fontname="Roboto"
        fontsize=10
        dir=none
        color="#475569"
        penwidth=1.5
    ];

    // --- CLUSTERS ---
    subgraph cluster_auth {
        label=""; penwidth=0; margin=20;
        User [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">UTILISATEUR</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">email<br/>nom<br/>role<br/>passwordHash</TD></TR>
            </TABLE>
        >];
    }
    subgraph cluster_core {
        label=""; penwidth=0; margin=20;
        Center [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">CENTRE</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">nom<br/>adresse<br/>ville<br/>code_postal</TD></TR>
            </TABLE>
        >];
        Beneficiary [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">BENEFICIAIRE</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">nom<br/>prenom<br/>revenus<br/>foyer<br/>points</TD></TR>
            </TABLE>
        >];
        Campaign [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">CAMPAGNE</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">nom<br/>date_debut<br/>date_fin</TD></TR>
            </TABLE>
        >];
        Registration [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">INSCRIPTION</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">statut<br/>note<br/>date</TD></TR>
            </TABLE>
        >];
    }
    subgraph cluster_stock {
        label=""; penwidth=0; margin=20;
        Product [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">PRODUIT</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">nom<br/>unite<br/>cout_points</TD></TR>
            </TABLE>
        >];
        Category [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">CATEGORIE</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">nom<br/>description</TD></TR>
            </TABLE>
        >];
        Stock [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">STOCK</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">quantite<br/>seuil_min<br/>date_maj</TD></TR>
            </TABLE>
        >];
        Lot [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">LOT</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">ref_batch<br/>date_exp<br/>date_reception</TD></TR>
            </TABLE>
        >];
        Mvt [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">MOUVEMENT</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">type<br/>quantite<br/>date</TD></TR>
            </TABLE>
        >];
    }
    subgraph cluster_ops {
        label=""; penwidth=0; margin=20;
        Distribution [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">DISTRIBUTION</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">total_points<br/>date</TD></TR>
            </TABLE>
        >];
        DistItem [label=<
            <TABLE BORDER="0" CELLBORDER="1" CELLSPACING="0" CELLPADDING="4" BGCOLOR="#FEF08A">
                <TR><TD BGCOLOR="#F59E0B"><B><FONT COLOR="WHITE">LIGNE_DISTRIB</FONT></B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFBEB"><B><U>id</U> (PK)</B></TD></TR>
                <TR><TD ALIGN="LEFT" BGCOLOR="#FFFFF0">quantite<br/>cout_points</TD></TR>
            </TABLE>
        >];
    }
    // --- ASSOCIATIONS ---
    node [shape=Mrecord, style=filled, fillcolor="#CFFAFE", color="#0891B2", height=0.6, fontsize=11, fontname="Roboto-Bold"];
    A_Travaille [label="{Travaille}"]; A_Lier [label="{Lié à}"]; A_Inscrit [label="{Inscrit}"];
    A_Organise [label="{Organise}"]; A_Demande [label="{Demande}"]; A_Concerne [label="{Concerne}"];
    A_Stocke [label="{Stocke}"]; A_ConcerneProd [label="{Concerne}"]; A_Classe [label="{Classé}"];
    A_ContientLot [label="{Contient}"]; A_TypeLot [label="{Type}"];
    A_SubitMvt [label="{Subit}"]; A_ImputeMvt [label="{Impute}"]; A_ValideMvt [label="{Valide}"];
    A_RecoitDist [label="{Reçoit}"]; A_LieuDist [label="{Lieu}"]; A_ComposeDist [label="{Compose}"];
    A_DistribueProd [label="{Distribué}"];
    
    // --- RELATIONS ---
    User -> A_Travaille [label="1,1"]; A_Travaille -> Center [label="0,n"];
    User -> A_Lier [label="0,1"]; A_Lier -> Beneficiary [label="0,1"];
    Center -> A_Inscrit [label="0,n"]; A_Inscrit -> Beneficiary [label="1,1"];
    Center -> A_Organise [label="0,n"]; A_Organise -> Campaign [label="1,1"];
    Beneficiary -> A_Demande [label="0,n"]; A_Demande -> Registration [label="1,1"];
    Campaign -> A_Concerne [label="0,n"]; A_Concerne -> Registration [label="1,1"];
    Category -> A_Classe [label="0,n"]; A_Classe -> Product [label="1,1"];
    Center -> A_Stocke [label="0,n"]; A_Stocke -> Stock [label="1,1"];
    Product -> A_ConcerneProd [label="0,n"]; A_ConcerneProd -> Stock [label="1,1"];
    Stock -> A_ContientLot [label="0,n"]; A_ContientLot -> Lot [label="1,1"];
    Product -> A_TypeLot [label="0,n"]; A_TypeLot -> Lot [label="1,1"];
    Stock -> A_SubitMvt [label="0,n"]; A_SubitMvt -> Mvt [label="1,1"];
    Lot -> A_ImputeMvt [label="0,n"]; A_ImputeMvt -> Mvt [label="0,1"];
    User -> A_ValideMvt [label="0,n"]; A_ValideMvt -> Mvt [label="1,1"];
    Beneficiary -> A_RecoitDist [label="0,n"]; A_RecoitDist -> Distribution [label="1,1"];
    Center -> A_LieuDist [label="0,n"]; A_LieuDist -> Distribution [label="1,1"];
    Distribution -> A_ComposeDist [label="1,n"]; A_ComposeDist -> DistItem [label="1,1"];
    Product -> A_DistribueProd [label="0,n"]; A_DistribueProd -> DistItem [label="1,1"];
}
`;

        // --- INIT ---
        let panZoom;
        const viz = new Viz();

        viz.renderSVGElement(dotSrc)
            .then(function (element) {
                document.getElementById('graph').appendChild(element);
                document.getElementById('loading').style.display = 'none';

                // Init Pan Zoom
                panZoom = svgPanZoom(element, {
                    zoomEnabled: true,
                    controlIconsEnabled: false,
                    fit: true,
                    center: true,
                    minZoom: 0.1,
                    maxZoom: 10
                });
                panZoom.zoom(0.85);

                setupInteractions();
                setupSearch();
            })
            .catch(error => { console.error(error); });

        // --- INTERACTIONS ---
        function setupInteractions() {
            // Add click listeners to all nodes
            const svg = document.querySelector('svg');
            const nodes = svg.querySelectorAll('.node');

            nodes.forEach(node => {
                const titleEl = node.querySelector('title');
                if (titleEl) {
                    const nodeName = titleEl.textContent;
                    // Only attach if we have a definition (skip associations)
                    if (tableDefinitions[nodeName]) {
                        node.addEventListener('click', (e) => {
                            e.stopPropagation(); // prevent zoom drag interference if any
                            openModal(nodeName);
                        });

                        // Add visual cue
                        node.style.cursor = 'pointer';
                        const poly = node.querySelector('polygon');
                        if (poly) poly.style.transition = 'all 0.2s';
                    }
                }
            });
        }

        // --- MODAL LOGIC ---
        function openModal(tableName) {
            const modal = document.getElementById('modalOverlay');
            const title = document.getElementById('modalTableName');
            const code = document.getElementById('modalCode');
            const def = tableDefinitions[tableName];

            title.textContent = "Structure : " + tableName;
            code.innerHTML = syntaxHighlight(def);

            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // Close on outside click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') closeModal();
        });

        // Basic SQL Syntax Highlighter
        function syntaxHighlight(sql) {
            if (!sql) return '';
            // Escape HTML
            sql = sql.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

            // Highlight keywords
            const keywords = /\b(CREATE|TABLE|PRIMARY|KEY|FOREIGN|REFERENCES|NOT NULL|DEFAULT|CONSTRAINT|AND|OR|IN|INSERT|UPDATE|DELETE|SELECT|FROM|WHERE|JOIN|ON|AS)\b/g;
            sql = sql.replace(keywords, '<span class="sql-kw">$1</span>');

            // Highlight types
            const types = /\b(TEXT|INTEGER|REAL|DATETIME|BOOLEAN)\b/g;
            sql = sql.replace(types, '<span class="sql-type">$1</span>');

            // Highlight strings
            sql = sql.replace(/('.*?')/g, '<span class="sql-str">$1</span>');

            // Highlight comments
            sql = sql.replace(/(--.*$)/gm, '<span class="sql-comment">$1</span>');

            return sql;
        }

        // --- SEARCH ---
        function setupSearch() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                const svg = document.querySelector('svg');
                svg.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted'));
                if (term.length < 2) return;
                const nodes = Array.from(svg.querySelectorAll('.node'));
                nodes.forEach(node => {
                    if (node.textContent.toLowerCase().includes(term)) node.classList.add('highlighted');
                });
            });
        }
    </script>
</body>
